{% extends "base.html" %}
{% block title %}Case Converter{% endblock %}

{% block content %}

<section class="calculator-page">

<div class="calculator-card">

<h1>🔤 Case Converter</h1>
<p class="subtitle">Convert text to Uppercase, Lowercase or Title Case</p>

<form method="POST" class="calc-form">

  <div class="input-group">
    <label>Enter Text</label>
    <textarea name="text" rows="6" required>{{ text }}</textarea>
  </div>

  <div class="input-group">
    <label>Choose Format</label>
    <select name="action">
      <option value="upper" {% if action=="upper" %}selected{% endif %}>UPPERCASE</option>
      <option value="lower" {% if action=="lower" %}selected{% endif %}>lowercase</option>
      <option value="title" {% if action=="title" %}selected{% endif %}>Title Case</option>
    </select>
  </div>

  <div class="btn-group">
    <button type="submit" class="calc-btn">Convert</button>
    <a href="/case-converter" class="reset-btn">Clear</a>
  </div>

</form>

{% if result %}

<div class="result-box">

  <h2>Converted Text</h2>

  <textarea rows="6" id="resultText">{{ result }}</textarea>

  <button class="copy-btn"
    onclick="navigator.clipboard.writeText(document.getElementById('resultText').value)">
    📋 Copy Text
  </button>

</div>

{% endif %}

</div>
</section>

{% endblock %}
