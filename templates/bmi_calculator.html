{% extends "base.html" %}

{% block title %}BMI Calculator – EasyTamilTools{% endblock %}

{% block content %}

<div class="bmi-container">

    <h1>⚖️ BMI Calculator</h1>
    <p class="subtitle">Check your Body Mass Index easily</p>

    <form method="post" class="bmi-form">

        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" name="weight" placeholder="Enter weight" required>
        </div>

        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" name="height" placeholder="Enter height" required>
        </div>

        <button type="submit" class="bmi-btn">Calculate BMI</button>

    </form>

    {% if bmi %}
    <div class="bmi-result">
        <h2>Your Result</h2>
        <p><strong>BMI:</strong> {{ bmi }}</p>
        <p><strong>Category:</strong> {{ category }}</p>
    </div>
    {% endif %}

</div>

{% endblock %}
