{% extends "base.html" %}
{% block content %}

<section class="calculator-page">

<div class="calculator-card">

<h1>🖼 Image To Text (OCR)</h1>
<p class="subtitle">Upload an image and extract text instantly</p>

<form method="POST" enctype="multipart/form-data" class="calc-form">

<!-- IMAGE INPUT -->
<div class="input-group">
<label>Select Image</label>
<input type="file" name="image" accept="image/*" required
       onchange="previewImage(event)">
</div>

<!-- IMAGE PREVIEW -->
<img id="preview"
     style="display:none;max-width:200px;margin:15px auto;border-radius:10px;">

<div class="btn-group">
<button type="submit" class="calc-btn">Convert</button>
<a href="/image-to-text" class="reset-btn">Clear</a>
</div>

</form>

<!-- ✅ ERROR MESSAGE -->
{% if error %}
<p style="color:red;text-align:center;margin-top:10px;">
{{ error }}
</p>
{% endif %}

{% if text %}

<div class="result-box">
<h2>Extracted Text</h2>

<textarea id="outputText" rows="8">{{ text }}</textarea>

<button class="copy-btn"
onclick="navigator.clipboard.writeText(
document.getElementById('outputText').value)">
📋 Copy Text
</button>

</div>

{% endif %}

</div>
</section>

<script>
function previewImage(event){
  const img = document.getElementById("preview");
  img.src = URL.createObjectURL(event.target.files[0]);
  img.style.display="block";
}
</script>

{% endblock %}
