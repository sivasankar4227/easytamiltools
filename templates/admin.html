{% extends "base.html" %}
{% block content %}

<div class="admin-container">

<h2>📝 Create New Blog Post</h2>

<form method="POST" enctype="multipart/form-data">

<!-- Title -->
<label>Title</label>
<input type="text" id="title" name="title" required>

<!-- Slug -->
<label>Slug (Auto Generated)</label>
<input type="text" id="slug" name="slug">

<!-- Category -->
<label>Category</label>
<select name="category">
    <option value="entertainment">Entertainment</option>
    <option value="news">News</option>
    <option value="tech">Tech</option>
    <option value="ott">OTT</option>
</select>

<!-- Tags -->
<label>Tags (comma separated)</label>
<input type="text" name="tags" placeholder="rashmika, vijay, wedding">

<!-- Featured Image -->
<label>Featured Image</label>
<input type="file" name="image" accept="image/*">

<!-- SEO -->
<hr>
<h3>🔍 SEO Settings</h3>

<label>Meta Title</label>
<input type="text" name="meta_title">

<label>Meta Description</label>
<textarea name="meta_description" rows="3"></textarea>

<hr>

<label>Content</label>
<textarea id="editor" name="content"></textarea>

<br><br>

<button type="submit" name="status" value="draft" class="draft-btn">
    Save Draft
</button>

<button type="submit" name="status" value="publish" class="publish-btn">
    Publish Post
</button>

</form>

<!-- 🔥 Separate Gold Form -->
<hr>

<h3 class="gold-title">💰 Gold & Silver Rate Update</h3>

<form method="POST" action="/update-gold" class="gold-form">
    
    <div class="input-group">
        <label>Gold Price (₹ / gram)</label>
        <input type="number" name="gold" placeholder="e.g. 6200" required>
    </div>

    <div class="input-group">
        <label>Silver Price (₹ / gram)</label>
        <input type="number" name="silver" placeholder="e.g. 75" required>
    </div>

    <button type="submit" class="update-btn">
        🔄 Update Price
    </button>

</form>
</div>

<style>
.admin-container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

.publish-btn{
    background:black;
    color:white;
    padding:10px 20px;
    border:none;
}

.draft-btn{
    background:gray;
    color:white;
    padding:10px 20px;
    border:none;
}

/* 🔥 Gold Form Styling */

.gold-title{
    margin-top:40px;
    font-size:20px;
    font-weight:600;
    color:#222;
}

/* Form Container */
.gold-form{
    background:#f9fafb;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    max-width:500px;
}

/* Input Group */
.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    font-weight:500;
    margin-bottom:5px;
    color:#444;
}

.input-group input{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#2563eb;
    outline:none;
    box-shadow:0 0 5px rgba(37,99,235,0.3);
}

/* Button */
.update-btn{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.update-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>


<!-- TinyMCE Advanced -->
<script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js"></script>

<script>
tinymce.init({
  selector: '#editor',
  height: 500,
  plugins: 'lists link image media table code fullscreen preview',
  toolbar: `
    undo redo | styles | bold italic underline |
    alignleft aligncenter alignright |
    bullist numlist |
    link image media table |
    preview fullscreen | code
  `,
  automatic_uploads: true,
  images_upload_url: '/upload-inline-image',
  file_picker_types: 'image',
});
</script>

<script>
document.getElementById("title").addEventListener("keyup", function(){
    let slug = this.value
        .toLowerCase()
        .replace(/ /g,'-')
        .replace(/[^\w-]+/g,'');
    document.getElementById("slug").value = slug;
});
</script>

{% endblock %}
