{% extends "base.html" %}
{% block content %}

<div class="tool-container">
    <h2>Text Counter</h2>

    <form method="POST">
        <textarea name="text" rows="6" placeholder="Type or paste text"></textarea>
        <br>
        <button type="submit">Count</button>
    </form>

    {% if count %}
        <p><strong>Word Count:</strong> {{ count }}</p>
    {% endif %}
</div>

{% endblock %}
